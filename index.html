  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 12px 40px;
      color: #fff;
      position: relative;
      background-color: #000;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      backdrop-filter: blur(1em) brightness(6);
      background-image: radial-gradient(
        circle at 50% 50%,
        #0000 0,
        #0000 2px,
        hsl(0 0 4%) 2px
      );
      background-size: 8px 8px;
      pointer-events: none;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      --c: #09f;
      background-color: #000;
      background-image:
        radial-gradient(4px 100px at 0% 50%, var(--c), #0000),
        radial-gradient(4px 100px at 20% 50%, var(--c), #0000),
        radial-gradient(1.5px 1.5px at 10% 25%, var(--c) 100%, #0000 150%),
        radial-gradient(4px 100px at 40% 50%, var(--c), #0000),
        radial-gradient(4px 100px at 60% 50%, var(--c), #0000),
        radial-gradient(1.5px 1.5px at 50% 25%, var(--c) 100%, #0000 150%),
        radial-gradient(4px 100px at 80% 50%, var(--c), #0000),
        radial-gradient(4px 100px at 100% 50%, var(--c), #0000),
        radial-gradient(1.5px 1.5px at 90% 25%, var(--c) 100%, #0000 150%),
        radial-gradient(4px 100px at 10% 70%, var(--c), #0000),
        radial-gradient(4px 100px at 30% 70%, var(--c), #0000),
        radial-gradient(1.5px 1.5px at 20% 35%, var(--c) 100%, #0000 150%),
        radial-gradient(4px 100px at 50% 70%, var(--c), #0000),
        radial-gradient(4px 100px at 70% 70%, var(--c), #0000),
        radial-gradient(1.5px 1.5px at 60% 35%, var(--c) 100%, #0000 150%),
        radial-gradient(4px 100px at 90% 70%, var(--c), #0000),
        radial-gradient(4px 100px at 100% 70%, var(--c), #0000),
        radial-gradient(1.5px 1.5px at 95% 35%, var(--c) 100%, #0000 150%);
      background-size: 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px, 300px 300px;
      animation: scan 150s linear infinite;
    }

    @keyframes scan {
      0% { background-position: 0px 0px, 3px 0px, 151.5px 25px, 25px 50px, 28px 50px, 176.5px 75px, 50px 100px, 53px 100px, 201.5px 125px, 75px 150px, 78px 150px, 226.5px 175px, 100px 200px, 103px 200px, 251.5px 225px, 125px 250px, 128px 250px, 276.5px 275px; }
      to { background-position: 0px 6800px, 3px 6800px, 151.5px 6825px, 25px 13650px, 28px 13650px, 176.5px 13675px, 50px 5425px, 53px 5425px, 201.5px 5450px, 75px 17175px, 78px 17175px, 226.5px 17200px, 100px 5125px, 103px 5125px, 251.5px 5150px, 125px 8450px, 128px 8450px, 276.5px 8475px; }
    }

    .gallery-header {
      text-align: center;
      margin-bottom: 30px;
      padding-top: 10px;
      position: relative;
      z-index: 1;
    }
    .gallery-title {
      font-size: clamp(2.4rem, 12vw, 4.2rem);
      font-weight: 800;
      letter-spacing: 4px;
      background: linear-gradient(135deg, #e81cff, #40c9ff, #fc00ff, #00dbde);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px rgba(64, 201, 255, 0.15));
      line-height: 1.2;
    }
    .gallery-sub {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 4px;
      margin-top: 6px;
      font-weight: 300;
      font-style: italic;
    }
    .gallery-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 32px 20px;
      max-width: 1200px;
      width: 100%;
      margin-bottom: 40px;
      position: relative;
      z-index: 1;
    }

    .card {
      position: relative;
      width: 280px;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      background: #0a0a0a;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.2s;
    }
    .card:active {
      transform: scale(0.97);
    }
    .card::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      background: linear-gradient(315deg, #03a9f4, #ff0058);
      z-index: 0;
      opacity: 0.7;
      transition: opacity 0.4s;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 20px;
      background: linear-gradient(315deg, #03a9f4, #ff0058);
      filter: blur(30px);
      z-index: 0;
      opacity: 0.5;
      transition: opacity 0.4s;
    }
    .card:hover::before,
    .card:hover::after {
      opacity: 1;
    }
    .card img {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 14px;
    }
    .card .title-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 2;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.7));
      padding: 20px 14px 14px;
      pointer-events: none;
      border-radius: 0 0 14px 14px;
    }
    .card .title-overlay .title {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.5), 0 0 60px rgba(232, 28, 255, 0.3);
      letter-spacing: 2px;
      text-align: center;
    }
    .card .title-overlay .by {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 300;
      margin-top: 2px;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
      text-align: center;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 999;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }

    /* ===== 弹窗主体（全局样式） ===== */
    .modal-content {
      background: #1a1a2a;
      border-radius: 24px;
      max-width: 700px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
    }

    /* 霓虹边框（全局） */
    .modal-content::before {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 28px;
      background: linear-gradient(315deg, #03a9f4, #ff0058);
      z-index: -1;
      opacity: 0.7;
      transition: opacity 0.4s;
    }
    .modal-content::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 28px;
      background: linear-gradient(315deg, #03a9f4, #ff0058);
      filter: blur(30px);
      z-index: -2;
      opacity: 0.5;
      transition: opacity 0.4s;
    }
    .modal-content:hover::before,
    .modal-content:hover::after {
      opacity: 1;
    }

    /* Mac 标题栏（全局） */
    .mac-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 0 16px;
      margin-bottom: 8px;
    }
    .mac-header span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .mac-header .red { background: #ff5f57; }
    .mac-header .yellow { background: #ffbd2e; }
    .mac-header .green { background: #28c941; }
    .mac-header .mac-title {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      margin-left: 8px;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    .modal-left {
      flex: 0 0 50%;
      background: #0d0d17;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    .modal-left img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      max-height: 60vh;
    }
    .modal-right {
      flex: 1;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #12121c;
      gap: 6px;
    }
    .modal-right .modal-author {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.4);
      font-weight: 300;
      letter-spacing: 1px;
    }
    .modal-right .modal-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 0 20px rgba(232, 28, 255, 0.3);
      letter-spacing: 1px;
    }
    .modal-right .modal-desc {
      font-size: 16px;
      line-height: 1.7;
      color: #c8c0d0;
      font-weight: 300;
      margin: 4px 0 12px 0;
    }
    .modal-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.4);
      font-size: 28px;
      cursor: pointer;
      transition: color 0.2s;
      padding: 0 6px;
      line-height: 1;
      z-index: 10;
    }
    .modal-close:hover {
      color: #fff;
    }

    .like-button {
      position: relative;
      cursor: pointer;
      display: flex;
      height: 48px;
      width: 136px;
      border-radius: 16px;
      border: none;
      background-color: #1d1d1d;
      overflow: hidden;
      box-shadow: inset -2px -2px 5px rgba(255, 255, 255, 0.2),
        inset 2px 2px 5px rgba(0, 0, 0, 0.1),
        4px 4px 10px rgba(0, 0, 0, 0.4),
        -2px -2px 8px rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
      margin-top: 4px;
    }
    #heart {
      display: none;
    }
    .like {
      width: 70%;
      height: 100%;
      display: flex;
      cursor: pointer;
      align-items: center;
      justify-content: space-evenly;
      padding: 0 4px;
    }
    .like-icon {
      fill: #505050;
      height: 28px;
      width: 28px;
    }
    .like-text {
      color: #fcfcfc;
      font-size: 16px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 400;
    }
    .like-count {
      position: absolute;
      right: 0;
      width: 30%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #717070;
      font-size: 16px;
      border-left: 2px solid #4e4e4e;
      transition: all 0.5s ease-out;
      background: transparent;
    }
    .like-count.two {
      transform: translateY(40px);
    }
    .on:checked~.like .like-icon {
      fill: #fc4e4e;
      animation: enlarge 0.2s ease-out 1;
      transition: all 0.2s ease-out;
    }
    .on:checked~.like-count.two {
      transform: translateX(0);
      color: #fcfcfc;
    }
    .on:checked~.like-count.one {
      transform: translateY(-40px);
    }
    @keyframes enlarge {
      0% { transform: scale(0.5); }
      100% { transform: scale(1.2); }
    }

    .mascot-wrapper {
      position: fixed;
      bottom: 20px;
      right: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 100;
      pointer-events: none;
    }
    .mascot-img {
      width: 90px;
      height: auto;
      filter: drop-shadow(0 0 25px rgba(232, 28, 255, 0.35));
      pointer-events: auto;
      cursor: pointer;
      transition: filter 0.3s;
    }
    .mascot-img:active {
      filter: drop-shadow(0 0 45px rgba(64, 201, 255, 0.7));
    }
    .mascot-bubble {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 30px;
      padding: 4px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #fff;
      letter-spacing: 1px;
      text-shadow: 0 0 12px #e81cff;
      margin-bottom: 6px;
      box-shadow: 0 0 30px rgba(232, 28, 255, 0.08);
      pointer-events: none;
      white-space: nowrap;
    }

    .footer {
      width: 100%;
      text-align: center;
      padding: 18px 0 8px;
      color: rgba(255, 255, 255, 0.12);
      font-size: 0.8rem;
      letter-spacing: 3px;
      border-top: 1px solid rgba(255, 255, 255, 0.03);
      margin-top: 10px;
      position: relative;
      z-index: 1;
    }
    .footer a {
      color: rgba(255, 255, 255, 0.2);
      text-decoration: none;
    }

    /* ===== 响应式：小屏幕 ===== */
    @media (max-width: 650px) {
      .card {
        width: 46vw;
        max-width: 280px;
        min-width: 140px;
      }
      .card .title-overlay .title {
        font-size: 16px;
      }
      .card .title-overlay .by {
        font-size: 11px;
      }

      .modal-content {
        flex-direction: column;
        max-height: 90vh;
      }
      .modal-left {
        flex: 0 0 auto;
        height: 40vh;
        padding: 8px;
      }
      .modal-left img {
        max-height: 100%;
      }
      .modal-right {
        padding: 16px;
      }
      .modal-right .modal-title {
        font-size: 20px;
      }
      .modal-right .modal-desc {
        font-size: 14px;
      }
      .like-button {
        height: 40px;
        width: 112px;
      }
      .like-icon {
        height: 22px;
        width: 22px;
      }
      .like-text {
        font-size: 13px;
      }
      .like-count {
        font-size: 13px;
      }
      .mascot-img {
        width: 65px;
      }
      .mascot-bubble {
        font-size: 11px;
        padding: 2px 12px;
      }
    }

    @media (max-width: 400px) {
      .gallery-grid {
        gap: 24px 12px;
      }
      .card {
        width: 44vw;
        min-width: 120px;
      }
      .card .title-overlay .title {
        font-size: 13px;
      }
      .card .title-overlay .by {
        font-size: 10px;
      }
      .like-button {
        height: 36px;
        width: 96px;
      }
      .like-icon {
        height: 18px;
        width: 18px;
      }
      .like-text {
        font-size: 11px;
      }
      .like-count {
        font-size: 11px;
      }
    }
  </style>
</head>

      function getCache() {
        try {
          return JSON.parse(localStorage.getItem(LIKE_CACHE_KEY)) || {};
        } catch {
          return {};
        }
      }

      function setCache(cache) {
        localStorage.setItem(LIKE_CACHE_KEY, JSON.stringify(cache));
      }

      function getPending() {
        try {
          return JSON.parse(localStorage.getItem(PENDING_QUEUE_KEY)) || [];
        } catch {
          return [];
        }
      }

      function setPending(queue) {
        localStorage.setItem(PENDING_QUEUE_KEY, JSON.stringify(queue));
      }

      function getSessionId() {
        let sid = localStorage.getItem('gallery_session_id');
        if (!sid) {
          sid = 'visitor_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
          localStorage.setItem('gallery_session_id', sid);
        }
        return sid;
      }
      const sessionId = getSessionId();

      // ===== 从 Supabase 拉取所有作品的云端点赞数 =====
      async function fetchAllCloudLikes() {
        try {
          const { data, error } = await supabase
            .from('likes')
            .select('artwork_id');
          if (error) {
            console.warn('拉取云端点赞数据失败:', error);
            return {};
          }
          const counts = {};
          data.forEach(row => {
            const id = row.artwork_id;
            counts[id] = (counts[id] || 0) + 1;
          });
          return counts;
        } catch (err) {
          console.warn('拉取云端点赞数据异常:', err);
          return {};
        }
      }

      // ===== 同步本地缓存与云端 =====
      async function syncFromCloud() {
        const cloudCounts = await fetchAllCloudLikes();
        const localCache = getCache();
        const pending = getPending();

        const pendingDelta = {};
        pending.forEach(item => {
          const id = item.artwork_id;
          pendingDelta[id] = (pendingDelta[id] || 0) + item.delta;
        });

        const merged = {};
        artworks.forEach(art => {
          const cloudVal = cloudCounts[art.id] || 0;
          const delta = pendingDelta[art.id] || 0;
          merged[art.id] = cloudVal + delta;
        });

        setCache(merged);
        return merged;
      }

      // ===== 执行批量上传 =====
      async function flushPending() {
        const pending = getPending();
        if (pending.length === 0) return;

        const deltaMap = {};
        pending.forEach(item => {
          const id = item.artwork_id;
          deltaMap[id] = (deltaMap[id] || 0) + item.delta;
        });

        const results = [];
        for (const [artworkId, delta] of Object.entries(deltaMap)) {
          if (delta === 0) continue;
          try {
            const { data: existing, error: fetchError } = await supabase
              .from('likes')
              .select('id')
              .eq('artwork_id', artworkId)
              .eq('session_id', sessionId)
              .maybeSingle();

            if (fetchError) {
              console.warn('查询点赞状态失败:', fetchError);
              results.push(false);
              continue;
            }

            if (delta > 0) {
              if (!existing) {
                const { error: insertError } = await supabase
                  .from('likes')
                  .insert([{ artwork_id: artworkId, session_id: sessionId }]);
                if (insertError) {
                  console.warn('批量点赞失败:', insertError);
                  results.push(false);
                  continue;
                }
              }
            } else {
              if (existing) {
                const { error: deleteError } = await supabase
                  .from('likes')
                  .delete()
                  .eq('id', existing.id);
                if (deleteError) {
                  console.warn('批量取消点赞失败:', deleteError);
                  results.push(false);
                  continue;
                }
              }
            }
            results.push(true);
          } catch (err) {
            console.warn('批量同步出错:', err);
            results.push(false);
          }
        }

        const allSuccess = results.every(r => r === true);
        if (allSuccess) {
          setPending([]);
          const cloudCounts = await fetchAllCloudLikes();
          setCache(cloudCounts);
          refreshAllDisplays(cloudCounts);
        } else {
          console.log('部分同步失败，等待下次重试');
        }
      }

      // ===== 刷新所有弹窗显示 =====
      function refreshAllDisplays(cloudCounts) {
        const cache = getCache();
        const pending = getPending();
        const pendingDelta = {};
        pending.forEach(item => {
          pendingDelta[item.artwork_id] = (pendingDelta[item.artwork_id] || 0) + item.delta;
        });

        artworks.forEach(art => {
          const cloudVal = cloudCounts[art.id] || 0;
          const delta = pendingDelta[art.id] || 0;
          const finalVal = cloudVal + delta;
          cache[art.id] = finalVal;
          if (currentArtworkId === art.id) {
            const one = document.getElementById('likeCountOne');
            const two = document.getElementById('likeCountTwo');
            if (one && two) {
              const oldVal = parseInt(one.textContent, 10) || 0;
              one.textContent = oldVal;
              two.textContent = finalVal;
            }
          }
        });
        setCache(cache);
      }

      // ===== 点赞点击处理（只绑定一次） =====
      function handleLikeClick(e) {
        e.preventDefault();
        if (!currentArtworkId) return;

        const cache = getCache();
        const currentCount = cache[currentArtworkId] || 0;
        const isCurrentlyLiked = likeCheckbox.checked;

        const newLiked = !isCurrentlyLiked;
        const newCount = newLiked ? currentCount + 1 : currentCount - 1;

        cache[currentArtworkId] = newCount;
        setCache(cache);

        const pending = getPending();
        const delta = newLiked ? 1 : -1;
        pending.push({
          artwork_id: currentArtworkId,
          delta: delta,
          timestamp: Date.now()
        });
        setPending(pending);

        const oldDisplay = parseInt(likeCountOne.textContent, 10) || 0;
        likeCountOne.textContent = oldDisplay;
        likeCountTwo.textContent = newCount;
        likeCheckbox.checked = newLiked;

        if (oldDisplay === newCount) {
          const label = likeCheckbox.nextElementSibling;
          label.style.transition = 'none';
          setTimeout(function() {
            label.style.transition = '';
          }, 10);
        }
      }

      // ===== 弹窗相关 =====
      const overlayEl = document.getElementById('modalOverlay');
      const closeBtn = document.getElementById('modalClose');
      const modalImg = document.getElementById('modalImage');
      const modalAuthor = document.getElementById('modalAuthor');
      const modalTitle = document.getElementById('modalTitle');
      const modalDesc = document.getElementById('modalDesc');
      const likeCheckbox = document.getElementById('heart');
      const likeCountOne = document.getElementById('likeCountOne');
      const likeCountTwo = document.getElementById('likeCountTwo');
      const likeLabel = document.getElementById('likeLabel');

      let currentArtworkId = null;

      function openModal(artworkId) {
        const art = artworks.find(a => a.id === artworkId);
        if (!art) return;

        modalImg.src = art.image;
        modalAuthor.textContent = 'by ' + art.author;
        modalTitle.textContent = art.title;
        modalDesc.textContent = art.description;

        currentArtworkId = artworkId;

        const cache = getCache();
        const count = cache[artworkId] || 0;
        likeCountOne.textContent = count;
        likeCountTwo.textContent = count;

        const pending = getPending();
        let netDelta = 0;
        pending.forEach(item => {
          if (item.artwork_id === artworkId) {
            netDelta += item.delta;
          }
        });
        likeCheckbox.checked = netDelta > 0;

        overlayEl.classList.add('active');
      }

      function closeModal() {
        overlayEl.classList.remove('active');
        currentArtworkId = null;
      }

      // ===== 渲染画廊卡片 =====
      const grid = document.getElementById('galleryGrid');
      artworks.forEach(function(art) {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.id = art.id;

        const img = document.createElement('img');
        img.src = art.image;
        img.alt = art.title;
        img.loading = 'lazy';
        img.onerror = function() {
          this.src = art.localImage;   // 如果网络图加载失败，换成本地图
        };

        const overlay = document.createElement('div');
        overlay.className = 'title-overlay';
        overlay.innerHTML = '<div class="title">' + art.title + '</div><div class="by">by ' + art.author +
          '</div>';

        card.appendChild(img);
        card.appendChild(overlay);
        grid.appendChild(card);

        card.addEventListener('click', function() {
          openModal(art.id);
        });
      });

      // ===== 事件绑定（只绑定一次） =====
      closeBtn.addEventListener('click', closeModal);
      overlayEl.addEventListener('click', function(e) {
        if (e.target === overlayEl) closeModal();
      });
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
      });

      // 关键修复：只在 label 上绑 click，阻止默认行为，防止重复触发
      likeLabel.addEventListener('click', handleLikeClick);

      // ===== 定时器 =====
      setInterval(function() {
        flushPending();
      }, 10000);

      // ===== 初始化 =====
      (async function init() {
        await syncFromCloud();
        console.log('✅ 画廊加载完成，共 ' + artworks.length + ' 件作品');
        console.log('✅ session_id:', sessionId);
        console.log('✅ 点赞缓存已同步，每分钟自动上传一次');
      })();

      window.addEventListener('beforeunload', function() {
        flushPending();
      });

    })();
  </script>
</body>
</html>
